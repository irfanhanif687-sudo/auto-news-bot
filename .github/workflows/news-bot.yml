name: Auto News Blogger

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests feedparser groq google-auth google-auth-oauthlib google-api-python-client
    
    - name: Run News Bot
      run: python auto-news-bot.py
    
    - name: Commit processed news
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add processed_news.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Update processed news"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
